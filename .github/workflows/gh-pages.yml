name: Deploy to GitHub Pages

on:
  push:
    branches: ["claude/optimistic-shannon-t9HvE"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Match the repository name. Edit this if the repo is renamed.
  REPO_NAME: Cybersecurity-Outline

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          DEPLOY_TARGET: github-pages
          NEXT_PUBLIC_BASE_PATH: /${{ env.REPO_NAME }}
        run: npm run build

      - name: Disable Jekyll processing on Pages
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
